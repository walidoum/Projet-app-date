<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Winnie et Vvs">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D0D0D">
<title>Journal — Winnie & Vvs</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=1773836635">

<script>try{var _t=JSON.parse(localStorage.getItem('wv_app')||'{}');if(_t.config&&_t.config.theme)document.body.setAttribute('data-theme',_t.config.theme)}catch(e){}</script>
</head>
<body>
<nav class="bnav" id="bnav">
  <button class="nb" data-p="list" onclick="NAV.go('list')"><span class="ni">📋</span><span>Liste</span></button>
  <button class="nb" data-p="stats" onclick="NAV.go('stats')"><span class="ni">📊</span><span>Stats</span></button>
  <button class="nb" data-p="map" onclick="NAV.go('map')"><span class="ni">🗺️</span><span>Carte</span></button>
  <button class="nb" data-p="journal" onclick="NAV.go('journal')"><span class="ni">📖</span><span>Journal</span></button>
  <button class="nb" data-p="settings" onclick="NAV.go('settings')"><span class="ni">⚙️</span><span>Réglages</span></button>
</nav>

<div id="toast"></div>
<canvas id="cc" style="position:fixed;inset:0;z-index:1799;pointer-events:none"></canvas>
<div id="cov" class="hidden" onclick="if(event.target===this)CN.no()">
  <div class="cbox"><h3 id="c-title" class="ctitle"></h3><p id="c-msg" class="cmsg"></p>
    <div class="cbtns"><button class="btn btn-g" onclick="CN.no()">Annuler</button><button class="btn btn-d" onclick="CN.yes()">Supprimer</button></div>
  </div>
</div>
<div id="lb" class="hidden" onclick="LB.close()">
  <button class="lbclose" onclick="LB.close()">✕</button>
  <button class="lbprev" onclick="event.stopPropagation();LB.prev()">‹</button>
  <button class="lbnext" onclick="event.stopPropagation();LB.next()">›</button>
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()">
</div>
<div class="ov hidden" id="sh-addjournal" onclick="UI.ovc(event,this)">
  <div class="sheet"><div class="handle"></div><h3 class="stitle" id="j-stitle">📖 Nouvelle entrée</h3>
    <input type="hidden" id="j-id">
    <div class="field"><label>Titre *</label><input type="text" id="j-title" class="inp"></div>
    <div class="frow">
      <div class="field"><label>Emoji</label><input type="text" id="j-emoji" class="inp" placeholder="❤️" maxlength="4"></div>
      <div class="field"><label>Date</label><input type="date" id="j-date" class="inp"></div>
    </div>
    <div class="field"><label>Texte *</label><textarea id="j-text" class="inp ta" rows="6"></textarea></div>
    <div class="field"><label>Lier à un souvenir</label><select id="j-link" class="inp sel-inp"><option value="">— Aucun —</option></select></div>
    <div class="sfooter"><button class="btn btn-g" onclick="UI.closeSheet('sh-addjournal')">Annuler</button><button class="btn btn-p" onclick="JOURNAL.save()">Publier ✦</button></div>
  </div>
</div>
<div class="content">
  <div class="ph">
    <div><h2 class="pt">Notre Journal</h2><p class="ps">Les mots du cœur</p></div>
    <button class="btn btn-p btn-sm" onclick="UI.openSheet('sh-addjournal')">+ Écrire</button>
  </div>
  <div style="padding:14px 16px" id="jlist"></div>
</div>

<script src="core.js?v=1773836635"></script>
<script>
var JOURNAL={
  render:function(){
    var el=document.getElementById('jlist');el.innerHTML='';
    var sorted=S.journal.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
    if(!sorted.length){el.innerHTML='<div class="empty"><div class="emico">📖</div><div class="emtxt">Aucune entrée.</div></div>';return;}
    sorted.forEach(function(j){
      var linked=j.link?S.memories.find(function(m){return m.id===j.link;}):null;
      var d=document.createElement('div');d.className='jentry';
      d.innerHTML='<span class="jemoji">'+(j.emoji||'📝')+'</span>'
        +'<div class="jhdr"><div class="jtitle">'+esc(j.title)+'</div><div class="jdate">'+fmtDate(j.date)+'</div></div>'
        +'<div class="jtext" style="font-family:\'Cormorant Garant\',serif;font-style:italic;font-size:15px;color:var(--tx);line-height:1.85;">'+esc(j.text)+'</div>'
        +(linked?'<div class="jlink" style="margin-top:8px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--acc2);">📍 '+esc(linked.title)+'</div>':'');
      var acts=document.createElement('div');acts.className='jacts';
      var eb=document.createElement('button');eb.className='btn btn-g btn-sm';eb.textContent='Modifier';eb.onclick=function(){JOURNAL.edit(j.id);};acts.appendChild(eb);
      var db=document.createElement('button');db.className='btn btn-d btn-sm';db.textContent='Supprimer';db.onclick=function(){JOURNAL.remove(j.id);};acts.appendChild(db);
      d.appendChild(acts);

      // Commentaires journal
      var jcSection=document.createElement('div');
      jcSection.style.cssText='margin-top:12px;padding-top:10px;border-top:1px solid var(--bd2);';
      (function(jid,container){
        function renderJCmts(){
          container.innerHTML='';
          var cmts=S.comments.filter(function(c){return c.journalId===jid;})
            .sort(function(a,b){return b.createdAt.localeCompare(a.createdAt);});
          cmts.forEach(function(c){
            var isVvs=c.author==='vvs';
            var bbl=document.createElement('div');
            bbl.className='cbubble'+(isVvs?'':' cbubble-own');
            bbl.innerHTML='<div class="cbmeta">'+(isVvs?'👸🏻 Vvs':'🤴🏽 Winnie')
              +' · '+new Date(c.createdAt).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+'</div>'
              +esc(c.text);
            var del=document.createElement('button');
            del.style.cssText='float:right;background:none;border:none;color:var(--tx3);cursor:pointer;font-size:12px;margin-left:6px;';
            del.textContent='×';
            del.onclick=function(){DB.delComment(c.id,function(){renderJCmts();});};
            bbl.insertBefore(del,bbl.firstChild);
            container.appendChild(bbl);
          });
          // Mini form
          var mf=document.createElement('div');mf.style.cssText='display:flex;gap:6px;margin-top:6px;';
          var selA='vvs';
          var togBtn=document.createElement('button');
          togBtn.style.cssText='flex-shrink:0;width:32px;height:32px;border-radius:50%;border:1px solid var(--bd);background:var(--sur2);cursor:pointer;font-size:14px;';
          togBtn.textContent='👸🏻';
          togBtn.onclick=function(){selA=selA==='vvs'?'winnie':'vvs';togBtn.textContent=selA==='vvs'?'👸🏻':'🤴🏽';};
          var inp=document.createElement('input');inp.type='text';inp.className='inp';inp.placeholder='Commenter...';inp.style.cssText='flex:1;padding:7px 12px;font-size:13px;';
          var send=document.createElement('button');send.className='btn btn-p btn-sm';send.textContent='→';send.style.cssText='padding:7px 14px;flex-shrink:0;';
          send.onclick=function(){var t=inp.value.trim();if(!t)return;DB.addComment(null,jid,selA,t,function(){inp.value='';renderJCmts();});};
          inp.addEventListener('keydown',function(e){if(e.key==='Enter')send.click();});
          mf.appendChild(togBtn);mf.appendChild(inp);mf.appendChild(send);container.appendChild(mf);
        }
        renderJCmts();
      })(j.id,jcSection);
      d.appendChild(jcSection);
      el.appendChild(d);
    });
  },
  save:function(){
    if(!UI.validate(['j-title','j-text']))return;
    var eid=UI.get('j-id');
    var entry={id:eid||uid(),title:UI.get('j-title'),text:UI.get('j-text'),emoji:UI.get('j-emoji')||'❤️',date:UI.get('j-date')||today(),link:document.getElementById('j-link').value};
    if(eid){var idx=S.journal.findIndex(function(j){return j.id===eid;});if(idx>=0)S.journal[idx]=entry;}else S.journal.unshift(entry);
    STG.save();DB.upsert('journal',{id:entry.id,title:entry.title,text:entry.text,emoji:entry.emoji,date:entry.date,link:entry.link||null,created_by:'winnie'},null);
    UI.closeSheet('sh-addjournal');JOURNAL.render();UI.toast(eid?'Entrée modifiée !':'Publié !','ok');
  },
  edit:function(id){
    var j=S.journal.find(function(x){return x.id===id;});if(!j)return;
    document.getElementById('j-stitle').textContent='Modifier entrée';
    UI.val('j-id',j.id);UI.val('j-title',j.title);UI.val('j-emoji',j.emoji||'');UI.val('j-date',j.date);UI.val('j-text',j.text);
    var lnk=document.getElementById('j-link');lnk.innerHTML='<option value="">Aucun</option>';
    S.memories.forEach(function(m){var o=document.createElement('option');o.value=m.id;o.textContent=m.title;if(m.id===j.link)o.selected=true;lnk.appendChild(o);});
    UI.openSheet('sh-addjournal');
  },
  remove:function(id){
    UI.confirm('Supprimer cette entrée ?','',function(){
      S.journal=S.journal.filter(function(j){return j.id!==id;});
      STG.save();DB.del('journal',id,null);JOURNAL.render();UI.toast('Supprimé','');
    });
  }
};
document.addEventListener('DOMContentLoaded',function(){initCommon(function(){NAV.cur='journal';JOURNAL.render();});});
</script>
</body>
</html>
