<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Winnie et Vvs">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D0D0D">
<title>Winnie &amp; Vvs</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=1773766705">
<style>
html,body{height:100%;margin:0;overflow:hidden;}
body{display:flex;align-items:center;justify-content:center;background:var(--bg);}
body::after{display:none!important;}
#splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden;transition:opacity .9s ease,transform .9s ease;}
.sorbs{position:absolute;inset:0;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.16;animation:orbf 10s ease-in-out infinite alternate;}
.o1{width:520px;height:520px;background:var(--acc);top:-120px;left:-120px;animation:orbDrift 14s ease-in-out infinite;opacity:.18;}
.o2{width:420px;height:420px;background:var(--acc2);bottom:-100px;right:-100px;animation:orbDrift2 18s ease-in-out infinite;animation-delay:-5s;opacity:.14;}
.o3{width:300px;height:300px;background:#6a3a9a;top:35%;left:55%;animation:orbDrift 10s ease-in-out infinite;animation-delay:-2s;opacity:.10;}
.o4{width:180px;height:180px;background:var(--acc);top:20%;right:10%;animation:orbDrift2 12s ease-in-out infinite;animation-delay:-7s;opacity:.08;filter:blur(50px);}
@keyframes orbf{to{transform:translate(40px,30px) scale(1.1);}}
.spc{text-align:center;z-index:1;padding:32px;max-width:480px;width:100%;}
.spey{font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:var(--tx2);margin-bottom:16px;animation:fu .8s .1s both;}
.sptitle{font-family:'Cormorant Garant',serif;font-size:clamp(3rem,10vw,5.5rem);font-weight:300;line-height:1;color:var(--acc);letter-spacing:.04em;animation:fu .8s .25s both;}
.sptitle em{font-style:italic;color:var(--acc2);}
.spdiv{width:80px;height:1px;margin:22px auto;background:linear-gradient(90deg,transparent,var(--acc),transparent);animation:fu .8s .4s both;}
.spsince{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--tx2);animation:fu .8s .5s both;}
.spcount{font-family:'Cormorant Garant',serif;font-size:clamp(3rem,8vw,4.5rem);font-weight:600;color:var(--acc);line-height:1;margin:6px 0;animation:fu .8s .6s both;}
.spcountlbl{font-family:'Cormorant Garant',serif;font-size:17px;color:var(--tx2);font-weight:300;animation:fu .8s .65s both;}
.spphrase{font-family:'Cormorant Garant',serif;font-style:italic;font-size:clamp(.95rem,3vw,1.2rem);color:var(--acc2);max-width:380px;margin:18px auto;line-height:1.7;animation:fu .8s .75s both;}
.spbtn{padding:13px 40px;background:transparent;border:1px solid var(--acc);border-radius:50px;color:var(--acc);font-family:'Jost',sans-serif;font-size:12px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;cursor:pointer;transition:all .35s cubic-bezier(0.16,1,0.3,1);animation:fu .8s .9s both;touch-action:manipulation;position:relative;overflow:hidden;}
.spbtn:active{transform:scale(0.96);background:var(--acc);color:var(--bg);}
.spbtn::after{content:'';position:absolute;inset:0;background:var(--acc);opacity:0;transition:opacity .3s;border-radius:50px;}
.spbtn.loading::after{opacity:.15;animation:pulse-btn .8s ease infinite alternate;}
@keyframes pulse-btn{to{opacity:.3}}
.spcount{font-family:'Cormorant Garant',serif;font-size:clamp(3rem,8vw,4.5rem);font-weight:600;color:var(--acc);line-height:1;margin:6px 0;animation:fu .8s .6s both;}
@keyframes fu{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
</style>
<script>try{var _t=JSON.parse(localStorage.getItem('wv_app')||'{}');if(_t.config&&_t.config.theme)document.body.setAttribute('data-theme',_t.config.theme)}catch(e){}</script>
</head>
<body>
<div id="splash">
  <div class="sorbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div><div class="orb o4"></div></div>
  <div class="spc">
    <p class="spey">✦ notre histoire ✦</p>
    <h1 class="sptitle" id="sp-title">Winnie <em>&amp;</em> Vvs</h1>
    <div class="spdiv"></div>
    <p class="spsince" id="sp-since"></p>
    <div class="spcount" id="sp-days">0</div>
    <p class="spcountlbl">jours d'amour</p>
    <p class="spphrase" id="sp-phrase"></p>
    <button class="spbtn" id="sp-btn">Entrer ✦</button>
  </div>
</div>
<script src="core.js?v=1773766705"></script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  try{var _t=JSON.parse(localStorage.getItem('wv_app')||'{}');if(_t.config&&_t.config.theme)document.body.setAttribute('data-theme',_t.config.theme)}catch(e){}
  STG.load();
  var cfg=S.config;
  function diffD(s){if(!s)return 0;try{var p=s.split('-');var su=Date.UTC(+p[0],+p[1]-1,+p[2]);var n=new Date();var nu=Date.UTC(n.getFullYear(),n.getMonth(),n.getDate());return Math.max(0,Math.floor((nu-su)/86400000));}catch(e){return 0;}}
  // Count-up animation
  var targetDays=diffD(cfg.startDate);
  var daysEl=document.getElementById('sp-days');
  var duration=1400,start=null,startVal=0;
  function easeOut(t){return 1-Math.pow(1-t,3);}
  function animCount(ts){
    if(!start)start=ts;
    var progress=Math.min((ts-start)/duration,1);
    daysEl.textContent=Math.round(startVal+(targetDays-startVal)*easeOut(progress));
    if(progress<1)requestAnimationFrame(animCount);
  }
  setTimeout(function(){requestAnimationFrame(animCount);},700);
  var te=document.getElementById('sp-title');if(te)te.innerHTML=(cfg.title||'Winnie & Vvs').replace(' & ',' <em>&amp;</em> ');
  var se=document.getElementById('sp-since');if(se){try{se.textContent='Ensemble depuis le '+new Date(cfg.startDate+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});}catch(e){}}
  var pe=document.getElementById('sp-phrase');if(pe&&cfg.phrase)pe.textContent='« '+cfg.phrase+' »';
  document.getElementById('sp-btn').onclick=function(){
    var btn=this;
    btn.classList.add('loading');
    btn.textContent='Chargement...';
    var s=document.getElementById('splash');
    setTimeout(function(){
      s.style.opacity='0';s.style.transform='scale(1.04)';
      setTimeout(function(){window.location.replace('carte.html');},420);
    },280);
  };
});
</script>
</body>
</html>
