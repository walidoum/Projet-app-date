<body>

<!-- FAB navigation injectée par fab.js -->

<div id="toast"></div>
<canvas id="cc" style="position:fixed;inset:0;z-index:1799;pointer-events:none"></canvas>

<div id="cov" class="hidden" onclick="if(event.target===this)CN.no()">
  <div class="cbox">
    <h3 id="c-title" class="ctitle"></h3>
    <p id="c-msg" class="cmsg"></p>
    <div class="cbtns">
      <button class="btn btn-g" onclick="CN.no()">Annuler</button>
      <button class="btn btn-d" onclick="CN.yes()">Supprimer</button>
    </div>
  </div>
</div>

<div id="lb" class="hidden" onclick="LB.close()">
  <button class="lbclose" onclick="LB.close()">&#10005;</button>
  <button class="lbprev" onclick="event.stopPropagation();LB.prev()">&#8249;</button>
  <button class="lbnext" onclick="event.stopPropagation();LB.next()">&#8250;</button>
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()">
</div>

<!-- Sheets Souvenir Add/Edit -->
<div class="ov hidden" id="sh-addmem" onclick="UI.ovc(event,this)">
  <div class="sheet"><div class="handle"></div><h3 class="stitle">&#10022; Nouveau souvenir</h3>
    <div id="am-badge" class="pbadge hidden">&#128205; Position s&#233;lectionn&#233;e</div>
    <div class="field"><label>Nom *</label><input type="text" id="a-title" class="inp" placeholder="ex : Le Petit Ch&#226;telet"></div>
    <div class="field"><label>Adresse</label>
      <div class="geobox"><input type="text" id="a-addr" class="inp" placeholder="ex : Paris, France" oninput="GEO.live(this.value,'a-addr','a-gr','addmem')" autocomplete="off">
        <button class="geobtn geobtn-p" onclick="GEO.fill('a-addr','am-badge','a-title')">Loc.</button></div>
      <div id="a-gr" class="geores hidden"></div></div>
    <div class="frow">
      <div class="field"><label>Date *</label><input type="date" id="a-date" class="inp"></div>
      <div class="field"><label>Cat&#233;gorie *</label><select id="a-cat" class="inp sel-inp"></select></div>
    </div>
    <div class="field"><label>Note</label><textarea id="a-note" class="inp ta" rows="3"></textarea></div>
    <div class="field"><label>Photos &amp; Vid&#233;os</label>
      <div class="uzone" onclick="document.getElementById('a-files').click()">&#128247; Appuyer pour ajouter
        <input type="file" id="a-files" accept="image/*,video/*" multiple style="display:none" onchange="MEDIA.preview(this,'a-prev','addmem')"></div>
      <div id="a-prev" class="mpgrid"></div></div>
    <div class="field"><label>Favori</label><select id="a-fav" class="inp sel-inp"><option value="0">Non</option><option value="1">&#11088; Oui</option></select></div>
    <div class="sfooter">
      <button class="btn btn-g" onclick="UI.closeSheet('sh-addmem')">Annuler</button>
      <button class="btn btn-p" onclick="MEM.save()">Enregistrer &#10022;</button>
    </div>
  </div>
</div>

<div class="ov hidden" id="sh-editmem" onclick="UI.ovc(event,this)">
  <div class="sheet"><div class="handle"></div><h3 class="stitle">&#9999;&#65039; Modifier</h3>
    <input type="hidden" id="e-id">
    <div class="field"><label>Nom *</label><input type="text" id="e-title" class="inp"></div>
    <div class="field"><label>Adresse</label>
      <div class="geobox"><input type="text" id="e-addr" class="inp" oninput="GEO.live(this.value,'e-addr','e-gr','editmem')" autocomplete="off">
        <button class="geobtn" onclick="GEO.fill('e-addr',null,null)">&#128205;</button></div>
      <div id="e-gr" class="geores hidden"></div></div>
    <div class="frow">
      <div class="field"><label>Date *</label><input type="date" id="e-date" class="inp"></div>
      <div class="field"><label>Cat&#233;gorie</label><select id="e-cat" class="inp sel-inp"></select></div>
    </div>
    <div class="field"><label>Note</label><textarea id="e-note" class="inp ta" rows="3"></textarea></div>
    <div class="field"><label>Favori</label><select id="e-fav" class="inp sel-inp"><option value="0">Non</option><option value="1">&#11088; Oui</option></select></div>
    <div class="field"><label>M&#233;dias existants</label>
      <div id="e-existing" class="exmed"></div>
      <div class="uzone" onclick="document.getElementById('e-files').click()">&#128247; Ajouter
        <input type="file" id="e-files" accept="image/*,video/*" multiple style="display:none" onchange="MEDIA.preview(this,'e-prev','editmem')"></div>
      <div id="e-prev" class="mpgrid"></div></div>
    <div class="sfooter">
      <button class="btn btn-g" onclick="UI.closeSheet('sh-editmem')">Annuler</button>
      <button class="btn btn-p" onclick="MEM.update()">Sauvegarder &#10022;</button>
    </div>
  </div>
</div>

<div class="ov hidden" id="sh-addwish" onclick="UI.ovc(event,this)">
  <div class="sheet"><div class="handle"></div><h3 class="stitle">&#128506; Wishlist</h3>
    <div id="aw-badge" class="pbadge hidden">&#128205; Position s&#233;lectionn&#233;e</div>
    <div class="field"><label>Nom *</label><input type="text" id="w-title" class="inp" placeholder="ex : Tokyo"></div>
    <div class="field"><label>Ville / Pays</label>
      <div class="geobox"><input type="text" id="w-addr" class="inp" oninput="GEO.live(this.value,'w-addr','w-gr','addwish')" autocomplete="off">
        <button class="geobtn" onclick="GEO.fill('w-addr','aw-badge',null)">&#128205;</button></div>
      <div id="w-gr" class="geores hidden"></div></div>
    <div class="field"><label>Cat&#233;gorie</label><select id="w-cat" class="inp sel-inp"></select></div>
    <div class="field"><label>Note</label><textarea id="w-note" class="inp ta" rows="2"></textarea></div>
    <div class="sfooter">
      <button class="btn btn-g" onclick="UI.closeSheet('sh-addwish')">Annuler</button>
      <button class="btn btn-p" onclick="WISH.save()">Ajouter &#10022;</button>
    </div>
  </div>
</div>

<div class="ov hidden" id="sh-cat" onclick="UI.ovc(event,this)">
  <div class="sheet"><div class="handle"></div><h3 class="stitle" id="cat-stitle">&#10022; Categorie</h3>
    <input type="hidden" id="cat-id"><input type="hidden" id="cat-type">
    <div class="field"><label>Nom *</label><input type="text" id="cat-name" class="inp"></div>
    <div class="frow">
      <div class="field"><label>Ic&#244;ne *</label><input type="text" id="cat-icon" class="inp" maxlength="4"></div>
      <div class="field"><label>Couleur</label><input type="color" id="cat-color" class="inp" style="padding:4px 6px;height:44px;cursor:pointer" value="#C9A96E"></div>
    </div>
    <div class="field" id="cat-anim-f"><label>Animation</label><select id="cat-anim" class="inp sel-inp"><option value="pulse">Pulsation</option><option value="bounce">Rebond</option><option value="glow">Halo</option><option value="none">Aucune</option></select></div>
    <div class="sfooter">
      <button class="btn btn-g" onclick="UI.closeSheet('sh-cat')">Annuler</button>
      <button class="btn btn-p" onclick="CAT.save()">Cr&#233;er &#10022;</button>
    </div>
  </div>
</div>

<div class="content" id="content">
  <div class="ph">
    <div><h2 class="pt">Nos Souvenirs</h2><p class="ps" id="list-lbl"></p></div>
    <button class="btn btn-p btn-sm" onclick="UI.openSheet('sh-addmem')">+ Ajouter</button>
  </div>
  <div class="fbar" id="list-fbar"></div>
  <div class="sortrow">
    <span>Trier :</span>
    <select class="sortsel" id="sort-sel" onchange="LIST.render()">
      <option value="recent">Plus r&#233;cent</option>
      <option value="old">Plus ancien</option>
      <option value="alpha">A &#8594; Z</option>
      <option value="fav">Favoris</option>
    </select>
  </div>
  <div class="masonry" id="masonry"></div>
</div>
<script src="core.js"></script>

<script>
var APP={_pos:null,_cw:null,_epos:null};
var MEM={
  save:function(){if(!UI.validate(['a-title','a-date']))return;var catId=document.getElementById('a-cat').value;if(!catId){UI.toast("Selectionne une categorie",'er');return}var pos=APP._pos||{lat:null,lng:null};APP._pos=null;var id=uid(),files=MEDIA.get('addmem');IDB.save(id,files,function(refs){var m={id:id,title:UI.get('a-title'),address:UI.get('a-addr'),lat:pos.lat,lng:pos.lng,date:UI.get('a-date'),catId:catId,note:UI.get('a-note'),fav:document.getElementById('a-fav').value==='1',photoRefs:refs,photos:[]};S.memories.push(m);STG.save();MEDIA.clear('addmem');DB.upsert('memories',{id:m.id,title:m.title,address:m.address||null,lat:m.lat||null,lng:m.lng||null,date:m.date,cat_id:m.catId,note:m.note||null,fav:m.fav,photo_refs:m.photoRefs||[],created_by:'winnie'},null);UI.closeSheet('sh-addmem');LIST.render();UI.toast('Souvenir ajoute !','ok');if(APP._cw){S.wishlist=S.wishlist.filter(function(w){return w.id!==APP._cw});APP._cw=null;STG.save()}})},
  detail:function(id){UI.revoke();var m=S.memories.find(function(x){return x.id===id});if(!m)return;var cat=S.categories.find(function(c){return c.id===m.catId});var old=document.getElementById('fs-detail');if(old)old.remove();var fs=document.createElement('div');fs.id='fs-detail';fs.className='fs';var hero=document.createElement('div');hero.className='fs-hero';var col=cat?cat.color:'var(--acc)';var tb=document.createElement('div');tb.className='fs-topbar';var back=document.createElement('button');back.className='fs-back';back.innerHTML='&#8592;';back.onclick=function(){MEM.closeDetail()};var fav=document.createElement('button');fav.className='fs-fav';fav.textContent=m.fav?'⭐ Favori':'Favori';fav.onclick=function(){m.fav=!m.fav;STG.save();fav.textContent=m.fav?'⭐ Favori':'Favori';LIST.render()};tb.appendChild(back);tb.appendChild(fav);hero.appendChild(tb);var pat=document.createElement('div');pat.className='fs-hero-pat';pat.style.background=col+'18';pat.textContent=cat?cat.icon:'&#128205;';hero.appendChild(pat);var grad=document.createElement('div');grad.className='fs-hero-grad';hero.appendChild(grad);fs.appendChild(hero);var sc=document.createElement('div');sc.className='fs-scroll';var title=document.createElement('h1');title.className='fs-title';title.textContent=m.title;sc.appendChild(title);var chips=document.createElement('div');chips.className='fs-chips';[{l:fmtDate(m.date)},cat?{l:cat.icon+' '+cat.name,s:'background:'+col+'22;color:'+col+';border-color:'+col+'44'}:null,m.address?{l:m.address}:null].filter(Boolean).forEach(function(c){var sp=document.createElement('span');sp.className='chip';sp.textContent=c.l;if(c.s)sp.setAttribute('style',c.s);chips.appendChild(sp)});sc.appendChild(chips);if(m.note){var note=document.createElement('div');note.className='fs-note';note.textContent=m.note;sc.appendChild(note)}var acts=document.createElement('div');acts.className='fs-acts';var eb=document.createElement('button');eb.className='btn btn-g';eb.textContent='Modifier';eb.onclick=function(){MEM.closeDetail();setTimeout(function(){MEM.edit(id)},200)};acts.appendChild(eb);var db=document.createElement('button');db.className='btn btn-d';db.textContent='Supprimer';db.onclick=function(){MEM.remove(id)};acts.appendChild(db);sc.appendChild(acts);fs.appendChild(sc);document.body.appendChild(fs);if(m.photoRefs&&m.photoRefs.length){IDB.forMem(id,function(meds){var imgs=meds.filter(function(x){return x.type&&x.type.startsWith('image/')});var vids=meds.filter(function(x){return x.type&&x.type.startsWith('video/')});if(imgs.length){var hi=document.createElement('img');hi.src=URL.createObjectURL(imgs[0].data);hi.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0';hi.onclick=function(){LB.open(imgs,0)};pat.style.display='none';hero.insertBefore(hi,grad);if(imgs.length>1){var strip=document.createElement('div');strip.className='fs-strip';sc.insertBefore(strip,title.nextSibling);imgs.forEach(function(med,i){var th=document.createElement('img');th.className='fs-thumb'+(i===0?' sel':'');th.src=URL.createObjectURL(med.data);th.onclick=function(){hi.src=URL.createObjectURL(med.data);strip.querySelectorAll('.fs-thumb').forEach(function(t){t.classList.remove('sel')});th.classList.add('sel')};strip.appendChild(th)})}}if(vids.length>0){var firstVid=vids[0];var vid=document.createElement('video');vid.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0;cursor:pointer';vid.src=URL.createObjectURL(firstVid.data);vid.setAttribute('autoplay','');vid.setAttribute('muted','');vid.setAttribute('loop','');vid.setAttribute('playsinline','');vid.setAttribute('webkit-playsinline','');vid.setAttribute('preload','auto');vid.muted=true;pat.style.display='none';var ei=hero.querySelector('img');if(ei)ei.remove();hero.insertBefore(vid,grad);var muteBtn=document.createElement('button');muteBtn.style.cssText='position:absolute;bottom:16px;right:16px;z-index:20;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .15s';muteBtn.textContent='🔇';muteBtn.onclick=function(e){e.stopPropagation();vid.muted=!vid.muted;muteBtn.textContent=vid.muted?'🔇':'🔊'};hero.appendChild(muteBtn);fs._stopVid=function(){try{vid.pause();vid.src=''}catch(e){}}}})};},
  closeDetail:function(){var fs=document.getElementById('fs-detail');if(!fs)return;if(fs._stopVid)fs._stopVid();fs.classList.add('out');setTimeout(function(){if(fs.parentNode)fs.parentNode.removeChild(fs)},320)},
  edit:function(id){var m=S.memories.find(function(x){return x.id===id});if(!m)return;UI.val('e-id',m.id);UI.val('e-title',m.title);UI.val('e-addr',m.address||'');UI.val('e-date',m.date);UI.val('e-note',m.note||'');document.getElementById('e-fav').value=m.fav?'1':'0';var cats=S.categories.filter(function(c){return c.type==='souvenir'});UI.sel('e-cat',cats.map(function(c){return{v:c.id,l:c.icon+' '+c.name}}),m.catId);document.getElementById('e-prev').innerHTML='';document.getElementById('e-files').value='';MEDIA.clear('editmem');APP._epos=null;var ex=document.getElementById('e-existing');ex.innerHTML='';if(m.photoRefs&&m.photoRefs.length){m.photoRefs.forEach(function(ref){var ch=document.createElement('span');ch.className='exchip';ch.innerHTML=(ref.type&&ref.type.startsWith('video/'))?'Video: '+esc(ref.name||ref.id):'Photo: '+esc(ref.name||ref.id);var del=document.createElement('button');del.className='exdel';del.textContent='x';del.onclick=function(){IDB.delOne(ref.id,function(){var mi=S.memories.find(function(x){return x.id===id});if(mi)mi.photoRefs=mi.photoRefs.filter(function(r){return r.id!==ref.id});STG.save();MEM.edit(id);UI.toast('Media supprime','')})};ch.appendChild(del);ex.appendChild(ch)})}setTimeout(function(){UI.openSheet('sh-editmem')},200)},
  update:function(){if(!UI.validate(['e-title','e-date']))return;var id=UI.get('e-id'),idx=S.memories.findIndex(function(m){return m.id===id});if(idx<0)return;var files=MEDIA.get('editmem'),pos=APP._epos;function done(refs){var m=S.memories[idx];S.memories[idx]=Object.assign({},m,{title:UI.get('e-title'),address:UI.get('e-addr'),date:UI.get('e-date'),catId:document.getElementById('e-cat').value,note:UI.get('e-note'),fav:document.getElementById('e-fav').value==='1',lat:pos?pos.lat:m.lat,lng:pos?pos.lng:m.lng,photoRefs:(m.photoRefs||[]).concat(refs)});STG.save();MEDIA.clear('editmem');UI.closeSheet('sh-editmem');LIST.render();UI.toast('Souvenir modifie !','ok')}if(files.length)IDB.save(id,files,function(refs){done(refs)});else done([])},
  remove:function(id){UI.confirm('Supprimer ce souvenir ?','Photos et videos supprimees.',function(){IDB.delMem(id,function(){S.memories=S.memories.filter(function(m){return m.id!==id});STG.save();DB.del('memories',id,null);UI.revoke();MEM.closeDetail();LIST.render();UI.toast('Supprime','')})})}
};
var WISH={
  save:function(){if(!UI.validate(['w-title']))return;var pos=APP._pos||{lat:null,lng:null};APP._pos=null;var w={id:uid(),title:UI.get('w-title'),address:UI.get('w-addr'),lat:pos.lat,lng:pos.lng,catId:document.getElementById('w-cat').value,note:UI.get('w-note')};S.wishlist.push(w);STG.save();DB.upsert('wishlist',{id:w.id,title:w.title,address:w.address||null,lat:w.lat||null,lng:w.lng||null,cat_id:w.catId,note:w.note||null,created_by:'winnie'},null);UI.closeSheet('sh-addwish');UI.toast('Ajoute a la wishlist !','ok')}
};
var H=[160,130,190,145,175,125,165,200,140,155];
var P=[function(c,i){return'<svg viewBox="0 0 100 100"><defs><pattern id="p'+i+'" width="15" height="15" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.2" fill="'+c+'" opacity="0.4"/></pattern></defs><rect width="100" height="100" fill="url(#p'+i+')"/></svg>'},function(c,i){return'<svg viewBox="0 0 100 100"><defs><pattern id="p'+i+'" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M10 2L11.5 8.5L18 10L11.5 11.5L10 18L8.5 11.5L2 10L8.5 8.5Z" fill="'+c+'" opacity="0.3"/></pattern></defs><rect width="100" height="100" fill="url(#p'+i+')"/></svg>'},function(c,i){return'<svg viewBox="0 0 100 100"><defs><pattern id="p'+i+'" width="25" height="25" patternUnits="userSpaceOnUse"><rect x="1" y="1" width="10" height="10" rx="2" fill="none" stroke="'+c+'" stroke-width="0.6" opacity="0.4"/></pattern></defs><rect width="100" height="100" fill="url(#p'+i+')"/></svg>'}];
var _f='all',_tc={};
var LIST={
  render:function(){var fb=document.getElementById('list-fbar');fb.innerHTML='';var cats=S.categories.filter(function(c){return c.type==='souvenir'});[{id:'all',l:'Tous'},{id:'fav',l:'Favoris'}].concat(cats.map(function(c){return{id:c.id,l:c.icon+' '+c.name}})).forEach(function(f){var b=document.createElement('button');b.className='chip'+(_f===f.id?' on':'');b.textContent=f.l;b.onclick=function(){_f=f.id;LIST.render()};fb.appendChild(b)});var sort=document.getElementById('sort-sel').value;var mems=S.memories.slice();if(_f==='fav')mems=mems.filter(function(m){return m.fav});else if(_f!=='all')mems=mems.filter(function(m){return m.catId===_f});if(sort==='recent')mems.sort(function(a,b){return b.date.localeCompare(a.date)});else if(sort==='old')mems.sort(function(a,b){return a.date.localeCompare(b.date)});else if(sort==='alpha')mems.sort(function(a,b){return a.title.localeCompare(b.title)});else if(sort==='fav')mems.sort(function(a,b){return(b.fav?1:0)-(a.fav?1:0)});var lbl=document.getElementById('list-lbl');if(lbl)lbl.textContent=S.memories.length+' moment'+(S.memories.length>1?'s':'')+' precieux';var grid=document.getElementById('masonry');grid.innerHTML='';if(!mems.length){grid.innerHTML='<div class="empty"><div class="emico">&#128173;</div><div class="emtxt">Aucun souvenir.</div></div>';return}mems.forEach(function(m,i){var cat=S.categories.find(function(c){return c.id===m.catId}),col=cat?cat.color:'#C9A96E',h=H[i%H.length];var first=m.photoRefs&&m.photoRefs.find(function(r){return r.type&&(r.type.startsWith('image/')||r.type.startsWith('video/'))});var card=document.createElement('div');card.className='mcard';card.innerHTML='<div class="mcpat" style="height:'+h+'px;background:'+col+'18">'+P[i%P.length](col,i)+'<div class="mcover"></div>'+(m.fav?'<div class="mcfav">&#11088;</div>':'')+'<div class="mccat" style="background:'+col+'30;color:'+col+';border:1px solid '+col+'50">'+(cat?cat.icon+' '+cat.name:'')+'</div><div class="mcbody"><div class="mctitle">'+esc(m.tit
