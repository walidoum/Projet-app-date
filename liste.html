<div id="toast"></div>
<canvas id="cc" style="position:fixed;inset:0;z-index:1799;pointer-events:none"></canvas>
<div id="cov" class="hidden" onclick="if(event.target===this)CN.no()">
  <div class="cbox"><h3 id="c-title" class="ctitle"></h3><p id="c-msg" class="cmsg"></p>
    <div class="cbtns"><button class="btn btn-g" onclick="CN.no()">Annuler</button><button class="btn btn-d" onclick="CN.yes()">Supprimer</button></div>
  </div>
</div>
<div id="lb" class="hidden" onclick="LB.close()">
  <button class="lbclose" onclick="LB.close()">✕</button>
  <button class="lbprev" onclick="event.stopPropagation();LB.prev()">‹</button>
  <button class="lbnext" onclick="event.stopPropagation();LB.next()">›</button>
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()">
</div>

<div class="ov hidden" id="sh-addmem" onclick="UI.ovc(event,this)">
  <div class="sheet"><div class="handle"></div><h3 class="stitle">✦ Nouveau souvenir</h3>
    <div id="am-badge" class="pbadge hidden">📍 Position sélectionnée</div>
    <div class="field"><label>Nom *</label><input type="text" id="a-title" class="inp" placeholder="ex : Le Petit Châtelet"></div>
    <div class="field"><label>Adresse</label>
      <div class="geobox"><input type="text" id="a-addr" class="inp" placeholder="ex : Paris, France" oninput="GEO.live(this.value,'a-addr','a-gr','addmem')" autocomplete="off">
        <button class="geobtn geobtn-p" onclick="GEO.fill('a-addr','am-badge','a-title')">Loc.</button></div>
      <div id="a-gr" class="geores hidden"></div></div>
    <div class="frow">
      <div class="field"><label>Date *</label><input type="date" id="a-date" class="inp"></div>
      <div class="field"><label>Catégorie *</label><select id="a-cat" class="inp sel-inp"></select></div>
    </div>
    <div class="field"><label>Note</label><textarea id="a-note" class="inp ta" rows="3"></textarea></div>
    <div class="field"><label>Photos &amp; Vidéos</label>
      <div class="uzone" onclick="document.getElementById('a-files').click()">📷 Appuyer pour ajouter
        <input type="file" id="a-files" accept="image/*,video/*" multiple style="display:none" onchange="MEDIA.preview(this,'a-prev','addmem')"></div>
      <div id="a-prev" class="mpgrid"></div></div>
    <div class="field"><label>Favori</label><select id="a-fav" class="inp sel-inp"><option value="0">Non</option><option value="1">⭐ Oui</option></select></div>
    <div class="sfooter"><button class="btn btn-g" onclick="UI.closeSheet('sh-addmem')">Annuler</button><button class="btn btn-p" onclick="MEM.save()">Enregistrer ✦</button></div>
  </div>
</div>
<div class="ov hidden" id="sh-editmem" onclick="UI.ovc(event,this)">
  <div class="sheet"><div class="handle"></div><h3 class="stitle">✏️ Modifier</h3>
    <input type="hidden" id="e-id">
    <div class="field"><label>Nom *</label><input type="text" id="e-title" class="inp"></div>
    <div class="field"><label>Adresse</label>
      <div class="geobox"><input type="text" id="e-addr" class="inp" oninput="GEO.live(this.value,'e-addr','e-gr','editmem')" autocomplete="off">
        <button class="geobtn" onclick="GEO.fill('e-addr',null,null)">📍</button></div>
      <div id="e-gr" class="geores hidden"></div></div>
    <div class="frow">
      <div class="field"><label>Date *</label><input type="date" id="e-date" class="inp"></div>
      <div class="field"><label>Catégorie</label><select id="e-cat" class="inp sel-inp"></select></div>
    </div>
    <div class="field"><label>Note</label><textarea id="e-note" class="inp ta" rows="3"></textarea></div>
    <div class="field"><label>Favori</label><select id="e-fav" class="inp sel-inp"><option value="0">Non</option><option value="1">⭐ Oui</option></select></div>
    <div class="field"><label>Médias existants</label><div id="e-existing" class="exmed"></div>
      <div class="uzone" onclick="document.getElementById('e-files').click()">📷 Ajouter
        <input type="file" id="e-files" accept="image/*,video/*" multiple style="display:none" onchange="MEDIA.preview(this,'e-prev','editmem')"></div>
      <div id="e-prev" class="mpgrid"></div></div>
    <div class="sfooter"><button class="btn btn-g" onclick="UI.closeSheet('sh-editmem')">Annuler</button><button class="btn btn-p" onclick="MEM.update()">Sauvegarder ✦</button></div>
  </div>
</div>
<div class="ov hidden" id="sh-addwish" onclick="UI.ovc(event,this)">
  <div class="sheet"><div class="handle"></div><h3 class="stitle">🗺️ Wishlist</h3>
    <div id="aw-badge" class="pbadge hidden">📍 Position sélectionnée</div>
    <div class="field"><label>Nom *</label><input type="text" id="w-title" class="inp" placeholder="ex : Tokyo"></div>
    <div class="field"><label>Ville / Pays</label>
      <div class="geobox"><input type="text" id="w-addr" class="inp" oninput="GEO.live(this.value,'w-addr','w-gr','addwish')" autocomplete="off">
        <button class="geobtn" onclick="GEO.fill('w-addr','aw-badge',null)">📍</button></div>
      <div id="w-gr" class="geores hidden"></div></div>
    <div class="field"><label>Catégorie</label><select id="w-cat" class="inp sel-inp"></select></div>
    <div class="field"><label>Note</label><textarea id="w-note" class="inp ta" rows="2"></textarea></div>
    <div class="sfooter"><button class="btn btn-g" onclick="UI.closeSheet('sh-addwish')">Annuler</button><button class="btn btn-p" onclick="WISH.save()">Ajouter ✦</button></div>
  </div>
</div>
<div class="ov hidden" id="sh-cat" onclick="UI.ovc(event,this)">
  <div class="sheet"><div class="handle"></div><h3 class="stitle" id="cat-stitle">✦ Catégorie</h3>
    <input type="hidden" id="cat-id"><input type="hidden" id="cat-type">
    <div class="field"><label>Nom *</label><input type="text" id="cat-name" class="inp"></div>
    <div class="frow">
      <div class="field"><label>Icône *</label><input type="text" id="cat-icon" class="inp" maxlength="4"></div>
      <div class="field"><label>Couleur</label><input type="color" id="cat-color" class="inp" style="padding:4px 6px;height:44px;cursor:pointer" value="#C9A96E"></div>
    </div>
    <div class="field" id="cat-anim-f"><label>Animation</label><select id="cat-anim" class="inp sel-inp"><option value="pulse">Pulsation</option><option value="bounce">Rebond</option><option value="glow">Halo</option><option value="none">Aucune</option></select></div>
    <div class="sfooter"><button class="btn btn-g" onclick="UI.closeSheet('sh-cat')">Annuler</button><button class="btn btn-p" onclick="CAT.save()">Créer ✦</button></div>
  </div>
</div>

  <div class="ph">
    <div><h2 class="pt">Nos Souvenirs</h2><p class="ps" id="list-lbl"></p></div>
    <button class="btn btn-p btn-sm" onclick="UI.openSheet('sh-addmem')">+ Ajouter</button>
  </div>
  <div class="searchbar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-inp" placeholder="Rechercher un souvenir..." oninput="LIST.search(this.value)" autocomplete="off">
  </div>

      <option value="recent">Plus récent</option>
      <option value="old">Plus ancien</option>

<script src="core.js?v=1773836635"></script>
<script>
var APP={_pos:null,_cw:null,_epos:null};

var MEM={
  save:function(){
    if(!UI.validate(['a-title','a-date']))return;
    var catId=document.getElementById('a-cat').value;
    if(!catId){UI.toast('Selectionne une categorie','er');return;}
    var pos=APP._pos||{lat:null,lng:null};APP._pos=null;
    var id=uid(),files=MEDIA.get('addmem');
    IDB.save(id,files,function(refs){
      var m={id:id,title:UI.get('a-title'),address:UI.get('a-addr'),lat:pos.lat,lng:pos.lng,
             date:UI.get('a-date'),catId:catId,note:UI.get('a-note'),
             fav:document.getElementById('a-fav').value==='1',photoRefs:refs,photos:[]};
      S.memories.push(m);STG.save();MEDIA.clear('addmem');
      DB.upsert('memories',{id:m.id,title:m.title,address:m.address||null,lat:m.lat||null,
        lng:m.lng||null,date:m.date,cat_id:m.catId,note:m.note||null,fav:m.fav,
        photo_refs:m.photoRefs||[],created_by:'winnie'},null);
      UI.closeSheet('sh-addmem');LIST.render();
      UI.toast('Souvenir ajouté'+(refs.length?' ('+refs.length+' média)':'')+'!','ok');
      if(APP._cw){S.wishlist=S.wishlist.filter(function(w){return w.id!==APP._cw});APP._cw=null;STG.save();}
    });
  },
  detail:function(id){
    UI.revoke();
    var m=S.memories.find(function(x){return x.id===id});if(!m)return;
    var cat=S.categories.find(function(c){return c.id===m.catId});
    var old=document.getElementById('fs-detail');if(old)old.remove();
    var fs=document.createElement('div');fs.id='fs-detail';fs.className='fs';
    var hero=document.createElement('div');hero.className='fs-hero';
    var col=cat?cat.color:'var(--acc)';
    // Topbar
    var tb=document.createElement('div');tb.className='fs-topbar';
    var back=document.createElement('button');back.className='fs-back';back.textContent='←';
    back.onclick=function(){MEM.closeDetail()};
    var fav=document.createElement('button');fav.className='fs-fav';
    fav.textContent=m.fav?'⭐ Favori':'Favori';
    fav.onclick=function(){m.fav=!m.fav;STG.save();fav.textContent=m.fav?'⭐ Favori':'Favori';LIST.render();};
    tb.appendChild(back);tb.appendChild(fav);hero.appendChild(tb);
    // Hero pattern
    var pat=document.createElement('div');pat.className='fs-hero-pat';
    pat.style.background=col+'18';pat.textContent=cat?cat.icon:'📍';
    hero.appendChild(pat);
    var grad=document.createElement('div');grad.className='fs-hero-grad';hero.appendChild(grad);
    fs.appendChild(hero);
    // Scroll content
    var sc=document.createElement('div');sc.className='fs-scroll';
    var title=document.createElement('h1');title.className='fs-title';title.textContent=m.title;sc.appendChild(title);
    var chips=document.createElement('div');chips.className='fs-chips';
    [{l:fmtDate(m.date)},
     cat?{l:cat.icon+' '+cat.name,s:'background:'+col+'22;color:'+col+';border-color:'+col+'44'}:null,
     m.address?{l:m.address}:null
    ].filter(Boolean).forEach(function(ch){
      var sp=document.createElement('span');sp.className='chip';sp.textContent=ch.l;
      if(ch.s)sp.setAttribute('style',ch.s);chips.appendChild(sp);
    });
    sc.appendChild(chips);
    if(m.note){var note=document.createElement('div');note.className='fs-note';note.textContent=m.note;sc.appendChild(note);}
    var acts=document.createElement('div');acts.className='fs-acts';
    var eb=document.createElement('button');eb.className='btn btn-g';eb.textContent='Modifier';
    eb.onclick=function(){MEM.closeDetail();setTimeout(function(){MEM.edit(id)},200);};
    acts.appendChild(eb);
    var db=document.createElement('button');db.className='btn btn-d';db.textContent='Supprimer';
    db.onclick=function(){MEM.remove(id);};acts.appendChild(db);
    sc.appendChild(acts);

    // ── Section commentaires ──────────────────────────────────
    var cmtSection=document.createElement('div');
    cmtSection.style.cssText='padding:16px 0 8px;border-top:1px solid var(--bd);margin-top:4px;';
    cmtSection.innerHTML='<div style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--tx2);margin-bottom:12px;">Commentaires</div>';

    // Liste des commentaires existants
    var cmtList=document.createElement('div');cmtList.id='cmt-list-'+id;
    function renderCmts(){
      cmtList.innerHTML='';
      var cmts=S.comments.filter(function(c){return c.memId===id;})
        .sort(function(a,b){return b.createdAt.localeCompare(a.createdAt);});
      if(!cmts.length){cmtList.innerHTML='<div style="font-size:13px;color:var(--tx3);font-style:italic;margin-bottom:12px;">Aucun commentaire</div>';}
      cmts.forEach(function(c){
        var row=document.createElement('div');
        row.style.cssText='display:flex;gap:10px;margin-bottom:12px;align-items:flex-start;';
        var avatar=document.createElement('div');
        var isVvs=c.author==='vvs';
        avatar.style.cssText='flex-shrink:0;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--sur2);border:1px solid var(--bd);';
        avatar.textContent=isVvs?'👸🏻':'🤴🏽';
        var bubble=document.createElement('div');
        bubble.style.cssText='flex:1;background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:8px 12px;position:relative;';
        var nameDate=document.createElement('div');
        nameDate.style.cssText='display:flex;justify-content:space-between;margin-bottom:4px;';
        nameDate.innerHTML='<span style="font-size:11px;font-weight:600;color:var(--acc);">'+(isVvs?'👸🏻 Vvs':'🤴🏽 Winnie')+'</span><span style="font-size:10px;color:var(--tx3);">'+new Date(c.createdAt).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+'</span>';
        var txt=document.createElement('div');
        txt.style.cssText='font-size:13px;color:var(--tx);line-height:1.5;';
        txt.textContent=c.text;
        bubble.appendChild(nameDate);bubble.appendChild(txt);
        // Bouton supprimer
        var del=document.createElement('button');
        del.style.cssText='position:absolute;top:6px;right:8px;background:none;border:none;color:var(--tx3);cursor:pointer;font-size:12px;padding:2px;';
        del.textContent='×';
        del.onclick=function(){DB.delComment(c.id,function(){renderCmts();});};
        bubble.appendChild(del);
        row.appendChild(avatar);row.appendChild(bubble);cmtList.appendChild(row);
      });
    }
    renderCmts();
    cmtSection.appendChild(cmtList);

    // Formulaire nouveau commentaire
    var cmtForm=document.createElement('div');
    cmtForm.style.cssText='display:flex;flex-direction:column;gap:8px;';
    // Choix auteur
    var authorRow=document.createElement('div');
    authorRow.style.cssText='display:flex;gap:8px;';
    var selAuthor='vvs'; // défaut
    ['vvs','winnie'].forEach(function(a){
      var btn=document.createElement('button');
      btn.style.cssText='flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--bd);background:'+(a===selAuthor?'var(--acc)':'transparent')+';color:'+(a===selAuthor?'var(--bg)':'var(--tx2)')+';font-family:Jost,sans-serif;font-size:13px;cursor:pointer;transition:all .2s;';
      btn.textContent=a==='vvs'?'👸🏻 Vvs':'🤴🏽 Winnie';
      btn.onclick=function(){
        selAuthor=a;
        authorRow.querySelectorAll('button').forEach(function(b){b.style.background='transparent';b.style.color='var(--tx2)';b.style.borderColor='var(--bd)';});
        btn.style.background='var(--acc)';btn.style.color='var(--bg)';btn.style.borderColor='var(--acc)';
      };
      authorRow.appendChild(btn);
    });
    cmtForm.appendChild(authorRow);
    // Textarea
    var cmtInput=document.createElement('textarea');
    cmtInput.className='inp ta';cmtInput.rows=2;cmtInput.placeholder='Écris un commentaire...';
    cmtInput.style.cssText='resize:none;font-size:14px;';
    cmtForm.appendChild(cmtInput);
    // Envoyer
    var sendBtn=document.createElement('button');
    sendBtn.className='btn btn-p btn-full';sendBtn.textContent='Envoyer ✦';
    sendBtn.onclick=function(){
      var txt=cmtInput.value.trim();if(!txt)return;
      sendBtn.disabled=true;sendBtn.textContent='...';
      DB.addComment(id,null,selAuthor,txt,function(){
        cmtInput.value='';sendBtn.disabled=false;sendBtn.textContent='Envoyer ✦';
        renderCmts();
      });
    };
    cmtForm.appendChild(sendBtn);
    cmtSection.appendChild(cmtForm);
    sc.appendChild(cmtSection);

    fs.appendChild(sc);
    document.body.appendChild(fs);
    // Swipe down to close
    var sy=0;
    fs.addEventListener('touchstart',function(e){sy=e.touches[0].clientY;},{passive:true});
    fs.addEventListener('touchend',function(e){if(e.changedTouches[0].clientY-sy>80&&sc.scrollTop===0)MEM.closeDetail();},{passive:true});
    // Charger médias
    if(m.photoRefs&&m.photoRefs.length){
      IDB.forMem(id,function(meds){
        var imgs=meds.filter(function(x){return x.type&&x.type.startsWith('image/')});
        var vids=meds.filter(function(x){return x.type&&x.type.startsWith('video/')});
        // Créer l'élément hero (img ou vidéo)
        var heroEl=null, currentVid=null;

        function showImg(src){
          // Cacher la vidéo si active
          if(currentVid){currentVid.pause();currentVid.style.display='none';}
          // Créer l'img si pas encore là
          if(!heroEl||heroEl.tagName!=='IMG'){
            if(heroEl)heroEl.remove();
            heroEl=document.createElement('img');
            heroEl.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0;cursor:pointer';
            heroEl.onclick=function(){LB.open(imgs,0);};
            pat.style.display='none';
            hero.insertBefore(heroEl,grad);
          }
          // TOUJOURS rendre visible (peut avoir été caché par showVid)
          heroEl.style.display='block';
          heroEl.src=src;
        }

        function showVid(data){
          if(!currentVid){
            currentVid=document.createElement('video');
            currentVid.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0';
            currentVid.muted=true;currentVid.loop=true;
            currentVid.setAttribute('playsinline','');currentVid.setAttribute('webkit-playsinline','');
            pat.style.display='none';hero.insertBefore(currentVid,grad);
            // Bouton mute (une seule fois)
            var mb=document.createElement('button');
            mb.style.cssText='position:absolute;bottom:14px;right:14px;z-index:20;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.6);border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;';
            mb.textContent='🔇';
            mb.onclick=function(e){e.stopPropagation();currentVid.muted=!currentVid.muted;mb.textContent=currentVid.muted?'🔇':'🔊';};
            hero.appendChild(mb);
            fs._stopVid=function(){try{currentVid.pause();currentVid.src='';}catch(e){}};
          }
          if(heroEl){heroEl.style.display='none';}
          currentVid.style.display='block';
          currentVid.src=URL.createObjectURL(data);
          currentVid.play().catch(function(){});
        }

        // Construire le strip de miniatures (photos + vidéos ensemble)
        var allMedia=[];
        imgs.forEach(function(m){allMedia.push({type:'img',data:m.data});});
        vids.forEach(function(m){allMedia.push({type:'vid',data:m.data});});

        if(allMedia.length>0){
          // Afficher le premier élément dans le hero
          if(allMedia[0].type==='img'){showImg(URL.createObjectURL(allMedia[0].data));}
          else{showVid(allMedia[0].data);}

          // Strip si plusieurs médias
          if(allMedia.length>1){
            var strip=document.createElement('div');strip.className='fs-strip';
            sc.insertBefore(strip,title.nextSibling);
            allMedia.forEach(function(med,i){
              var th=document.createElement('div');
              th.style.cssText='flex-shrink:0;width:90px;height:90px;border-radius:12px;overflow:hidden;cursor:pointer;border:2px solid '+(i===0?'var(--acc)':'transparent')+';position:relative;background:#111;';
              if(med.type==='img'){
                var ti=document.createElement('img');
                ti.src=URL.createObjectURL(med.data);
                ti.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';
                th.appendChild(ti);
              } else {
                // Miniature vidéo avec icône play
                th.style.background='#222';
                th.innerHTML='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:26px;">▶️</div>';
              }
              th.onclick=(function(m2,idx2){return function(){
                strip.querySelectorAll('div').forEach(function(t){t.style.borderColor='transparent';});
                th.style.borderColor='var(--acc)';
                if(m2.type==='img'){showImg(URL.createObjectURL(m2.data));}
                else{showVid(m2.data);}
              };})(med,i);
              strip.appendChild(th);
            });
          } else if(imgs.length>0){
            // Pas de strip mais click sur hero → lightbox
            if(heroEl)heroEl.onclick=function(){LB.open(imgs,0);};
          }
        }
      });
    }
  },
  closeDetail:function(){
    var fs=document.getElementById('fs-detail');if(!fs)return;
    if(fs._stopVid)fs._stopVid();
    fs.classList.add('out');setTimeout(function(){if(fs.parentNode)fs.parentNode.removeChild(fs);},320);
  },
  edit:function(id){
    var m=S.memories.find(function(x){return x.id===id});if(!m)return;
    UI.val('e-id',m.id);UI.val('e-title',m.title);UI.val('e-addr',m.address||'');
    UI.val('e-date',m.date);UI.val('e-note',m.note||'');
    document.getElementById('e-fav').value=m.fav?'1':'0';
    var cats=S.categories.filter(function(c){return c.type==='souvenir'});
    UI.sel('e-cat',cats.map(function(c){return{v:c.id,l:c.icon+' '+c.name};}),m.catId);
    document.getElementById('e-prev').innerHTML='';
    document.getElementById('e-files').value='';
    MEDIA.clear('editmem');APP._epos=null;
    var ex=document.getElementById('e-existing');ex.innerHTML='';
    if(m.photoRefs&&m.photoRefs.length){
      m.photoRefs.forEach(function(ref){
        var ch=document.createElement('span');ch.className='exchip';
        ch.innerHTML=(ref.type&&ref.type.startsWith('video/'))?'Vidéo: '+esc(ref.name||ref.id):'Photo: '+esc(ref.name||ref.id);
        var del=document.createElement('button');del.className='exdel';del.textContent='x';
        del.onclick=function(){IDB.delOne(ref.id,function(){var mi=S.memories.find(function(x){return x.id===id});if(mi)mi.photoRefs=mi.photoRefs.filter(function(r){return r.id!==ref.id});STG.save();MEM.edit(id);UI.toast('Média supprimé','');});};
        ch.appendChild(del);ex.appendChild(ch);
      });
    }
    setTimeout(function(){UI.openSheet('sh-editmem');},200);
  },
  update:function(){
    if(!UI.validate(['e-title','e-date']))return;
    var id=UI.get('e-id'),idx=S.memories.findIndex(function(m){return m.id===id;});
    if(idx<0)return;
    var files=MEDIA.get('editmem'),pos=APP._epos;
    function done(refs){
      var m=S.memories[idx];
      S.memories[idx]=Object.assign({},m,{
        title:UI.get('e-title'),address:UI.get('e-addr'),date:UI.get('e-date'),
        catId:document.getElementById('e-cat').value,note:UI.get('e-note'),
        fav:document.getElementById('e-fav').value==='1',
        lat:pos?pos.lat:m.lat,lng:pos?pos.lng:m.lng,
        photoRefs:(m.photoRefs||[]).concat(refs)
      });
      STG.save();MEDIA.clear('editmem');UI.closeSheet('sh-editmem');LIST.render();
      UI.toast('Souvenir modifié !','ok');
    }
    if(files.length)IDB.save(id,files,function(refs){done(refs);});else done([]);
  },
  remove:function(id){
    UI.confirm('Supprimer ce souvenir ?','Photos et vidéos supprimées.',function(){
      IDB.delMem(id,function(){
        S.memories=S.memories.filter(function(m){return m.id!==id;});
        STG.save();DB.del('memories',id,null);UI.revoke();MEM.closeDetail();LIST.render();
        UI.toast('Supprimé','');
      });
    });
  }
};

var WISH={
  save:function(){
    if(!UI.validate(['w-title']))return;
    var pos=APP._pos||{lat:null,lng:null};APP._pos=null;
    var w={id:uid(),title:UI.get('w-title'),address:UI.get('w-addr'),lat:pos.lat,lng:pos.lng,
           catId:document.getElementById('w-cat').value,note:UI.get('w-note')};
    S.wishlist.push(w);STG.save();
    DB.upsert('wishlist',{id:w.id,title:w.title,address:w.address||null,lat:w.lat||null,
      lng:w.lng||null,cat_id:w.catId,note:w.note||null,created_by:'winnie'},null);
    UI.closeSheet('sh-addwish');UI.toast('Ajouté à la wishlist !','ok');
  }
};

var H=[160,130,190,145,175,125,165,200,140,155];
var P=[
  function(c,i){return '<svg viewBox="0 0 100 100"><defs><pattern id="p'+i+'" width="15" height="15" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.2" fill="'+c+'" opacity="0.4"/></pattern></defs><rect width="100" height="100" fill="url(#p'+i+')"/></svg>';},
  function(c,i){return '<svg viewBox="0 0 100 100"><defs><pattern id="p'+i+'" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M10 2L11.5 8.5L18 10L11.5 11.5L10 18L8.5 11.5L2 10L8.5 8.5Z" fill="'+c+'" opacity="0.3"/></pattern></defs><rect width="100" height="100" fill="url(#p'+i+')"/></svg>';},
  function(c,i){return '<svg viewBox="0 0 100 100"><defs><pattern id="p'+i+'" width="20" height="20" patternUnits="userSpaceOnUse"><polygon points="10,2 18,10 10,18 2,10" fill="'+c+'" opacity="0.25"/></pattern></defs><rect width="100" height="100" fill="url(#p'+i+')"/></svg>';}
];

var _f='all',_tc={},_q='';
var LIST={
  search:function(v){_q=v.toLowerCase().trim();LIST.render();},
  render:function(){
    var fb=document.getElementById('list-fbar');fb.innerHTML='';
    var cats=S.categories.filter(function(c){return c.type==='souvenir';});
    [{id:'all',l:'Tous'},{id:'fav',l:'Favoris'}].concat(cats.map(function(c){return{id:c.id,l:c.icon+' '+c.name};}))
    .forEach(function(f){
      var b=document.createElement('button');b.className='chip'+(_f===f.id?' on':'');
      b.textContent=f.l;b.onclick=function(){_f=f.id;LIST.render();};fb.appendChild(b);
    });
    var sort=document.getElementById('sort-sel').value;
    var mems=S.memories.slice();
    if(_f==='fav')mems=mems.filter(function(m){return m.fav;});
    else if(_f!=='all')mems=mems.filter(function(m){return m.catId===_f;});
    if(_q)mems=mems.filter(function(m){return(m.title+' '+(m.note||'')+' '+(m.address||'')).toLowerCase().indexOf(_q)>-1;});
    if(sort==='recent')mems.sort(function(a,b){return b.date.localeCompare(a.date);});
    else if(sort==='old')mems.sort(function(a,b){return a.date.localeCompare(b.date);});
    else if(sort==='alpha')mems.sort(function(a,b){return a.title.localeCompare(b.title);});
    else if(sort==='fav')mems.sort(function(a,b){return(b.fav?1:0)-(a.fav?1:0);});
    var lbl=document.getElementById('list-lbl');
    if(lbl)lbl.textContent=S.memories.length+' moment'+(S.memories.length>1?'s':'')+' précieux';
    var grid=document.getElementById('masonry');grid.innerHTML='';
    if(!mems.length){grid.innerHTML='<div class="empty"><div class="emico">'
      +(_q?'🔍':'💭')+'</div><div class="emtxt">'+(_q?'Aucun résultat pour «\u00a0'+_q+'\u00a0»':'Aucun souvenir pour l\'instant.')+'</div></div>';return;}
    mems.forEach(function(m,i){
      var cat=S.categories.find(function(c){return c.id===m.catId;}),col=cat?cat.color:'#C9A96E',h=H[i%H.length];
      var first=m.photoRefs&&m.photoRefs.find(function(r){return r.type&&(r.type.startsWith('image/')||r.type.startsWith('video/'));});
      var card=document.createElement('div');card.className='mcard';
      card.innerHTML='<div class="mcpat" style="height:'+h+'px;background:'+col+'18">'+P[i%P.length](col,i)+
        '<div class="mcover"></div>'+(m.fav?'<div class="mcfav">⭐</div>':'')+
        '<div class="mccat" style="background:'+col+'30;color:'+col+';border:1px solid '+col+'50">'+(cat?cat.icon+' '+cat.name:'')+
        '</div><div class="mcbody"><div class="mctitle">'+esc(m.title)+'</div><div class="mcdate">'+fmtDate(m.date)+'</div></div></div>';
      card.onclick=function(){MEM.detail(m.id);};
      grid.appendChild(card);
      if(first){
        var mid=first.id;
        if(_tc[mid]){LIST._inj(card,_tc[mid],h,col,m,cat,first.type.startsWith('video/'));}
        else IDB.one(mid,function(rec){
          if(!rec||!rec.data)return;
          if(rec.type&&rec.type.startsWith('video/')){
            LIST._vth(rec.data,function(u){if(u){_tc[mid]=u;LIST._inj(card,u,h,col,m,cat,true);}});
          }else{var u=URL.createObjectURL(rec.data);_tc[mid]=u;LIST._inj(card,u,h,col,m,cat,false);}
        });
      }
    });
  },
  _vth:function(blob,cb){
    var u=URL.createObjectURL(blob);var v=document.createElement('video');
    v.muted=true;v.playsInline=true;v.src=u;v.currentTime=0.5;
    v.onseeked=function(){try{var c=document.createElement('canvas');c.width=v.videoWidth||320;c.height=v.videoHeight||240;c.getContext('2d').drawImage(v,0,0,c.width,c.height);URL.revokeObjectURL(u);cb(c.toDataURL('image/jpeg',.8));}catch(e){URL.revokeObjectURL(u);cb(null);}};
    v.onerror=function(){URL.revokeObjectURL(u);cb(null);};v.load();
  },
  _inj:function(card,url,h,col,m,cat,isVid){
    var p=card.querySelector('.mcpat');if(!p)return;
    p.innerHTML='<img src="'+url+'" style="width:100%;height:'+h+'px;object-fit:cover;display:block" alt="'+esc(m.title)+'">'+
      (isVid?'<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:36px;height:36px;background:rgba(0,0,0,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px">▶️</div>':'')+
      '<div class="mcover"></div>'+(m.fav?'<div class="mcfav">⭐</div>':'')+
      '<div class="mccat" style="background:'+col+'30;color:'+col+';border:1px solid '+col+'50">'+(cat?cat.icon+' '+cat.name:'')+
      '</div><div class="mcbody"><div class="mctitle">'+esc(m.title)+'</div><div class="mcdate">'+fmtDate(m.date)+'</div></div>';
  }
};

document.addEventListener('DOMContentLoaded',function(){
  // Skeleton loading pendant init
  var grid=document.getElementById('masonry');
  grid.innerHTML='<div class="skeleton skel-card"></div><div class="skeleton skel-card"></div><div class="skeleton skel-card"></div><div class="skeleton skel-card"></div>';
  initCommon(function(){NAV.cur='list';LIST.render();});
});
</script>
